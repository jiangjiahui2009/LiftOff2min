<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftOff2min — 两分钟升空，即刻动身做事</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #fff;
    overflow: hidden;
}
.nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; height: 56px;
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 28px; height: 28px; border-radius: 7px; }
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; opacity: 0.9; }
.nav-right { display: flex; align-items: center; gap: 20px; }
.nav-link {
    font-size: 12px; color: rgba(255,255,255,0.45);
    text-decoration: none; letter-spacing: 0.3px;
    transition: color .25s;
}
.nav-link:hover { color: rgba(255,255,255,0.8); }
.btn-download {
    font-size: 12px; font-weight: 600;
    padding: 6px 18px; border-radius: 14px;
    background: #fff; color: #000;
    text-decoration: none; letter-spacing: 0.4px;
    transition: transform .2s, box-shadow .25s;
}
.btn-download:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,255,255,.15); }
.stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.chrono-wrap {
    position: relative;
    width: min(78vmin, 520px);
    height: min(78vmin, 520px);
}
.chrono-svg { width: 100%; height: 100%; }
.tagline {
    position: fixed; bottom: 36px; left: 0; right: 0;
    text-align: center; z-index: 50;
}
.tagline span {
    font-size: 11.5px; letter-spacing: 2px;
    color: rgba(255,255,255,0.25);
}
@media (max-width: 480px) {
    .nav { padding: 12px 18px; }
    .logo-text { font-size: 13px; }
    .btn-download { padding: 5px 14px; font-size: 11.5px; }
    .tagline span { font-size: 10px; letter-spacing: 1.5px; }
}

</style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="16" fill="#111"/>
            <circle cx="30" cy="32" r="17" fill="#ddd"/>
            <g stroke="#888" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 5">
                <ellipse cx="34" cy="33" rx="26" ry="10" transform="rotate(-22 34 33)"/>
            </g>
            <circle cx="56" cy="21" r="5" fill="#fff"/>
        </svg>
        <span class="logo-text">LiftOff2min</span>
    </div>
    <div class="nav-right">
        <a href="terms.html" class="nav-link">用户协议</a>
        <a href="privacy.html" class="nav-link">隐私政策</a>
        <a href="#" class="btn-download">App Store</a>
    </div>
</nav>


<div class="stage">
    <div class="chrono-wrap">
        <svg class="chrono-svg" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">

            <!-- OUTER RING — JS rotates 60s/rev -->
            <g id="outerGroup"></g>

            <!-- INNER RING — JS rotates 600s/rev (10min) -->
            <g id="innerGroup">
                <circle cx="280" cy="280" r="132" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            </g>

            <!-- Center: countdown → dot -->
            <text id="countdown" x="280" y="282" text-anchor="middle" dominant-baseline="middle"
                  font-family="-apple-system,sans-serif" font-size="18" font-weight="500"
                  fill="rgba(255,255,255,0.6)" visibility="visible">2:00</text>
            <circle id="centerDot" cx="280" cy="280" r="4" fill="rgba(255,255,255,0.7)" visibility="hidden"/>

        </svg>
    </div>
</div>

<div class="tagline"><span>两分钟升空 · 即刻动身做事</span></div>

<script>
(function() {
const CX = 280, CY = 280;
const svgNS = 'http://www.w3.org/2000/svg';

// ─── OUTER RING: 60-second chronograph ───
const outerG = document.getElementById('outerGroup');
const R = 240;

for (let i = 0; i < 60; i++) {
    const angleDeg = i * 6 - 90;
    const angleRad = angleDeg * Math.PI / 180;
    const is5 = i % 5 === 0;

    // tick
    const len = is5 ? 16 : 7, w = is5 ? 1.4 : 0.7, alpha = is5 ? 0.5 : 0.18;
    const x1 = CX + (R - len) * Math.cos(angleRad);
    const y1 = CY + (R - len) * Math.sin(angleRad);
    const x2 = CX + R * Math.cos(angleRad);
    const y2 = CY + R * Math.sin(angleRad);
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'rgba(255,255,255,' + alpha + ')');
    line.setAttribute('stroke-width', w);
    outerG.appendChild(line);

    // number
    const numVal = i === 0 ? 60 : i;
    const numR = R - 28;
    const nx = CX + numR * Math.cos(angleRad);
    const ny = CY + numR * Math.sin(angleRad);
    const txt = document.createElementNS(svgNS, 'text');
    txt.setAttribute('x', nx); txt.setAttribute('y', ny + 1);
    txt.textContent = numVal;
    const rotAngle = angleDeg >= -90 && angleDeg <= 90 ? angleDeg : angleDeg + 180;
    txt.setAttribute('transform', 'rotate(' + rotAngle + ',' + nx + ',' + ny + ')');
    txt.setAttribute('font-size', is5 ? '14' : '9.5');
    txt.setAttribute('fill', is5 ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.2)');
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('dominant-baseline', 'middle');
    txt.setAttribute('font-family', '-apple-system,sans-serif');
    outerG.appendChild(txt);
}

// ─── INNER RING: 12-hour face ───
const innerG = document.getElementById('innerGroup');
const IR = 122;

// 12 hour numbers
for (let i = 1; i <= 12; i++) {
    const angleDeg = i * 30 - 90;
    const angleRad = angleDeg * Math.PI / 180;
    const numR = IR - 22;
    const nx = CX + numR * Math.cos(angleRad);
    const ny = CY + numR * Math.sin(angleRad);
    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('x', nx); t.setAttribute('y', ny + 1);
    t.textContent = i;
    const rotAngle = angleDeg >= -90 && angleDeg <= 90 ? angleDeg : angleDeg + 180;
    t.setAttribute('transform', 'rotate(' + rotAngle + ',' + nx + ',' + ny + ')');
    t.setAttribute('font-size', i % 3 === 0 ? '18' : '14');
    t.setAttribute('fill', i % 3 === 0 ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.4)');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('font-family', '-apple-system,sans-serif');
    innerG.appendChild(t);
}

// 60 minute ticks
for (let i = 0; i < 60; i++) {
    const angleDeg = i * 6 - 90;
    const angleRad = angleDeg * Math.PI / 180;
    const isHour = i % 5 === 0;
    const len = isHour ? 10 : 5, w = isHour ? 1.1 : 0.5, alpha = isHour ? 0.4 : 0.15;
    const x1 = CX + (IR - len) * Math.cos(angleRad);
    const y1 = CY + (IR - len) * Math.sin(angleRad);
    const x2 = CX + IR * Math.cos(angleRad);
    const y2 = CY + IR * Math.sin(angleRad);
    const l = document.createElementNS(svgNS, 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', 'rgba(255,255,255,' + alpha + ')');
    l.setAttribute('stroke-width', w);
    innerG.appendChild(l);
}

// ─── JS-driven rotation (reliable for SVG) ───
const countdownEl = document.getElementById('countdown');
const centerDot = document.getElementById('centerDot');
const startTime = Date.now();

function animate() {
    const elapsed = (Date.now() - startTime) / 1000;

    // outer: 60s per revolution → angle = elapsed / 60 * 360
    const outerDeg = (elapsed / 60) * 360;
    outerG.setAttribute('transform', 'rotate(' + outerDeg + ' ' + CX + ' ' + CY + ')');

    // inner: 600s per revolution, counter-clockwise → angle = -elapsed / 600 * 360
    const innerDeg = -(elapsed / 600) * 360;
    innerG.setAttribute('transform', 'rotate(' + innerDeg + ' ' + CX + ' ' + CY + ')');

    // countdown: 2min, then show center dot
    const remain = 120 - elapsed;
    if (remain <= 0) {
        countdownEl.setAttribute('visibility', 'hidden');
        centerDot.setAttribute('visibility', 'visible');
    } else {
        countdownEl.setAttribute('visibility', 'visible');
        centerDot.setAttribute('visibility', 'hidden');
        const m = Math.floor(remain / 60);
        const s = Math.floor(remain % 60);
        countdownEl.textContent = m + ':' + String(s).padStart(2, '0');
    }

    requestAnimationFrame(animate);
}
animate();


})();
</script>
</body>
</html>
